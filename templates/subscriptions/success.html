{% extends 'base.html' %}

{% block title %}Subscription Activated — JobHub{% endblock %}

{% block content %}
<div style="min-height:60vh;display:flex;align-items:center;justify-content:center;padding:3rem 1rem;">
  <div class="text-center" style="max-width:480px;">
    <div style="width:80px;height:80px;background:#E3F5EC;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 1.5rem;">
      <i class="bi bi-check-circle-fill" style="font-size:2.5rem;color:#1A7A4A;"></i>
    </div>
    <h2 style="font-family:'Playfair Display',serif;margin-bottom:.5rem;">You're all set!</h2>
    <p style="color:var(--text-muted);margin-bottom:2rem;">Your subscription is now active. Enjoy all your plan benefits.</p>
    <div class="d-flex gap-3 justify-content-center">
      <a href="{% url 'dashboard:index' %}" class="btn btn-primary px-4">Go to Dashboard</a>
      <a href="{% url 'jobs:list' %}" class="btn btn-outline-secondary px-4">Browse Jobs</a>
    </div>
  </div>
</div>
{% endblock %}
